<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multimodal Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <span class="logo-text">Multimodal Search</span>
    </div>
    <div class="header-right">
      <div class="index-pill"><span class="count" id="img-count">—</span> images indexed</div>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <div class="hero-eyebrow">CLIP · Qdrant · BM25</div>
    <h1 class="hero-title">Find anything with<br><em>text or image</em></h1>
    <p class="hero-sub">Semantic search across your entire image collection using multimodal AI embeddings.</p>
  </section>

  <div class="search-wrap">
    <div class="search-field" id="text-field">
      <div class="search-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <input
        type="text"
        class="search-input"
        id="query-input"
        placeholder="sunset over mountains, a red car, people laughing…"
        autocomplete="off"
        autofocus
      >
      <button class="search-btn" id="search-btn" onclick="runTextSearch()">Search</button>
    </div>

    <div class="mode-tabs">
      <button class="tab active" id="tab-text" onclick="setMode('text')">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
        Text
      </button>
      <button class="tab" id="tab-hybrid" onclick="setMode('hybrid')">
        <svg viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Hybrid
      </button>
      <button class="tab" id="tab-image" onclick="setMode('image')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Image
      </button>
    </div>

    <div class="upload-zone hidden" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" onchange="onFileSelected(this)">
      <label class="upload-label" for="file-input">
        <div class="upload-icon-ring">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p>Click to upload an image</p>
        <span>JPG, PNG, WEBP up to 10MB</span>
      </label>
      <div class="upload-file-preview hidden" id="file-preview">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="file-name-text"></span>
      </div>
      <button class="img-search-btn hidden" id="img-btn" onclick="runImageSearch()">Search with this image</button>
    </div>
  </div>

  <div class="status-bar" id="status">
    <div class="spinner" id="status-spinner"></div>
    <span id="status-text"></span>
  </div>

  <div id="results-section" class="hidden">
    <div class="results-header">
      <div class="results-count"><strong id="count-num">0</strong> results</div>
      <div class="results-badges">
        <div class="mode-badge" id="mode-badge"></div>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="empty-rings">
      <div class="empty-icon-inner">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
    </div>
    <h3>Search your collection</h3>
    <p>Type a description or upload an image to find visually similar results</p>
    <div class="suggestion-chips">
      <button class="chip" onclick="suggest('sunset over the ocean')">sunset over the ocean</button>
      <button class="chip" onclick="suggest('a dog playing')">a dog playing</button>
      <button class="chip" onclick="suggest('city at night')">city at night</button>
      <button class="chip" onclick="suggest('mountain landscape')">mountain landscape</button>
      <button class="chip" onclick="suggest('white flower')">white flower</button>
    </div>
  </div>
</main>

<script>
let mode = 'text';
let selectedFile = null;
let busy = false;

async function loadStats() {
  try {
    const r = await fetch('/stats');
    const d = await r.json();
    document.getElementById('img-count').textContent = d.total_images.toLocaleString();
  } catch {}
}

function setMode(m) {
  mode = m;
  ['text','hybrid','image'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('active', id === m);
  });
  const isImg = m === 'image';
  document.getElementById('text-field').classList.toggle('hidden', isImg);
  document.getElementById('upload-zone').classList.toggle('hidden', !isImg);
  if (!isImg) document.getElementById('query-input').focus();
}

function onFileSelected(input) {
  selectedFile = input.files[0];
  if (!selectedFile) return;
  document.getElementById('file-name-text').textContent = selectedFile.name;
  document.getElementById('file-preview').classList.remove('hidden');
  document.getElementById('img-btn').classList.remove('hidden');
}

function suggest(q) {
  setMode('text');
  document.getElementById('query-input').value = q;
  runTextSearch();
}

function setLoading(on) {
  busy = on;
  document.getElementById('search-btn').disabled = on;
  document.getElementById('search-btn').textContent = on ? 'Searching…' : 'Search';
  document.getElementById('img-btn').disabled = on;
  const bar = document.getElementById('status');
  const spinner = document.getElementById('status-spinner');
  const txt = document.getElementById('status-text');
  if (on) {
    txt.textContent = 'Searching…';
    spinner.style.display = 'block';
    bar.className = 'status-bar visible loading';
  } else {
    bar.className = 'status-bar';
  }
}

function showError(msg) {
  const bar = document.getElementById('status');
  document.getElementById('status-spinner').style.display = 'none';
  document.getElementById('status-text').textContent = msg;
  bar.className = 'status-bar visible error';
}

async function runTextSearch() {
  if (busy) return;
  const query = document.getElementById('query-input').value.trim();
  if (!query) return;
  const endpoint = mode === 'hybrid' ? '/search/hybrid' : '/search/text';
  setLoading(true);
  try {
    const r = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, top_k: 20 }),
    });
    const d = await r.json();
    if (!r.ok) { showError(d.error || 'Search failed'); return; }
    render(d.results, d.mode);
  } catch(e) {
    showError('Network error — is Flask running?');
  } finally {
    setLoading(false);
  }
}

async function runImageSearch() {
  if (!selectedFile || busy) return;
  setLoading(true);
  const form = new FormData();
  form.append('file', selectedFile);
  form.append('top_k', '20');
  try {
    const r = await fetch('/search/image', { method: 'POST', body: form });
    const d = await r.json();
    if (!r.ok) { showError(d.error || 'Search failed'); return; }
    render(d.results, 'image');
  } catch(e) {
    showError('Network error — is Flask running?');
  } finally {
    setLoading(false);
  }
}

function render(results, modeName) {
  document.getElementById('empty-state').classList.add('hidden');
  const section = document.getElementById('results-section');
  const grid = document.getElementById('grid');

  if (!results || results.length === 0) {
    showError('No results found — try a different query.');
    section.classList.add('hidden');
    return;
  }

  document.getElementById('count-num').textContent = results.length;
  const badge = document.getElementById('mode-badge');
  badge.textContent = modeName;
  badge.className = 'mode-badge ' + modeName;
  section.classList.remove('hidden');

  const isHybrid = results[0] && results[0].clip_score !== undefined;

  grid.innerHTML = '';

  results.forEach((r, i) => {
    const pct      = (r.score * 100).toFixed(1);
    const fillW    = Math.min(r.score * 200, 100).toFixed(1);
    const caption  = (r.caption || r.filename || 'image ' + r.id)
                       .replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const detail   = isHybrid
      ? 'CLIP ' + (r.clip_score * 100).toFixed(1) + '% · BM25 ' + (r.bm25_score * 100).toFixed(1) + '%'
      : 'similarity';

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = Math.min(i * 0.04, 0.4) + 's';

    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img-wrap';

    const img = document.createElement('img');
    img.className = 'card-img';
    img.alt = caption;
    img.loading = 'lazy';
    img.src = '/image/' + r.id;
    img.onerror = function() {
      imgWrap.innerHTML = '<div class="card-img-err"><svg viewBox="0 0 24 24" stroke-width="1.5" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>not found</span></div>';
    };

    const overlay = document.createElement('div');
    overlay.className = 'card-score-overlay';
    overlay.textContent = pct + '%';

    imgWrap.appendChild(img);
    imgWrap.appendChild(overlay);

    card.innerHTML += '';
    card.appendChild(imgWrap);

    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML =
      '<div class="card-caption" title="' + caption + '">' + caption + '</div>' +
      '<div class="score-track"><div class="score-fill" style="width:' + fillW + '%"></div></div>' +
      '<div class="score-meta">' +
        '<span class="score-clips">' + detail + '</span>' +
        '<span class="score-rank">#' + (i + 1) + '</span>' +
      '</div>';

    card.appendChild(body);
    grid.appendChild(card);
  });
}
  
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && mode !== 'image') runTextSearch();
});

loadStats();
</script>
</body>
</html>
